<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖店上架助手</title>
<style>
:root{--red:#e74c3c;--blue:#3498db;--green:#27ae60;--bg:#f8f9fa;--card:#fff;--border:#e9ecef;--text:#2c3e50;--muted:#95a5a6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:32px 20px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.logo{font-size:24px;font-weight:700}.logo span{color:var(--red)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}.dot.busy{background:#f39c12;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.card{background:var(--card);border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:24px;overflow:hidden}
.card-hd{padding:20px 28px;border-bottom:1px solid var(--border);font-size:16px;font-weight:600;display:flex;align-items:center;gap:12px}
.card-bd{padding:24px 28px}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.35;pointer-events:none}
.btn-p{background:var(--red);color:#fff}.btn-p:hover{background:#c0392b}
.btn-s{background:var(--green);color:#fff}.btn-s:hover{background:#1e8449}
.btn-o{background:var(--card);color:var(--text);border:1.5px solid var(--border)}.btn-o:hover{border-color:var(--text)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:5px}
.btn-group,.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.tabs{display:flex;gap:4px;background:#f1f3f5;padding:4px;border-radius:8px;overflow-x:auto}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--muted)}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06)}

.tbl-wrap{overflow:auto;max-height:480px;border-radius:10px;border:1px solid var(--border)}
.tbl-wrap table{border-collapse:collapse;font-size:11px;min-width:100%}
.tbl-wrap th{background:#f8f9fa;padding:8px 10px;text-align:left;font-weight:600;font-size:10px;color:var(--muted);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:2;white-space:nowrap}
.tbl-wrap td{padding:6px 8px;border-bottom:1px solid #f1f3f5;vertical-align:middle;min-width:60px}
.tbl-wrap td img{width:50px;height:50px;object-fit:cover;border-radius:6px;border:1px solid #eee}
.tbl-wrap td.img-cell{min-width:100px}
.tbl-wrap td.img-cell.dragover{background:#fdf2f2!important;outline:2px dashed var(--red)}
.tbl-wrap td[contenteditable=true]{outline:1px solid transparent;cursor:text}
.tbl-wrap td[contenteditable=true]:focus{outline-color:var(--red);background:#fff!important}
.c-ai{background:#ebf5fb!important}.c-man{background:#fef9e7!important}.c-fix{background:#eafaf1!important}
.c-empty{background:#ffeaea!important}.c-empty::after{content:' 未填';color:var(--red);font-size:10px}

.img-zone{border:2px dashed #dee2e6;border-radius:10px;padding:12px 16px;min-height:52px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;transition:.2s;margin-bottom:16px}
.img-zone.dragover{border-color:var(--red);background:#fdf2f2}
.img-zone .img-thumb{width:48px;height:48px;object-fit:cover;border-radius:6px;border:2px solid transparent;cursor:grab}
.img-zone .img-thumb:hover{border-color:var(--red)}

.output-list,.pub-list{display:flex;flex-direction:column;gap:6px}
.o-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:13px}
.o-item:hover{border-color:var(--blue)}.o-item.sel{border-color:var(--red);background:#fef5f5}
.o-item .o-info{display:flex;align-items:center;gap:10px}
.o-item .o-name{font-weight:600}.o-item .o-meta{font-size:11px;color:var(--muted)}

.progress-bar{height:6px;background:#f1f3f5;border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:var(--red);border-radius:3px;transition:width .4s}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}

.log{background:#1e1e1e;color:#d4d4d4;border-radius:10px;padding:14px 18px;font-family:"Consolas",monospace;font-size:11px;max-height:200px;overflow:auto;line-height:1.7}
.log .ok{color:#6a9955}.log .err{color:#f44747}.log .warn{color:#dcdcaa}.log .info{color:#9cdcfe}

.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.tag-ok{background:#d5f5e3;color:#1e8449}.tag-warn{background:#fef9e7;color:#b7950b}.tag-err{background:#fadbd8;color:#c0392b}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:18px;padding:36px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:8px}.modal p{color:var(--muted);margin-bottom:16px;font-size:13px}
.modal input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;text-align:center;outline:none}
.modal input:focus{border-color:var(--red)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">

<div class="nav">
  <div class="logo"><span>抖店</span>上架助手</div>
  <div style="font-size:13px;color:var(--muted)"><span class="dot" id="dot"></span><span id="stText">就绪</span></div>
</div>

<!-- 01 -->
<div class="card">
  <div class="card-hd">01 上传 & 编辑
    <span style="flex:1"></span>
    <button class="btn btn-o btn-sm" onclick="resetAll()" id="btnReset" style="display:none">清除</button>
  </div>
  <div class="card-bd">
    <div class="toolbar" style="margin-bottom:12px">
      <button class="btn btn-o" onclick="document.getElementById('fx').click()">📊 上传 Excel</button>
      <input type="file" id="fx" accept=".xlsx" hidden onchange="upExcel(this.files[0])">
      <button class="btn btn-o btn-sm" onclick="document.getElementById('fi').click()">🖼️ 选图片</button>
      <input type="file" id="fi" accept="image/*" multiple hidden onchange="addImgs(this.files)">
      <span id="upMsg" style="font-size:12px;color:var(--muted)">未上传</span>
    </div>
    <div class="img-zone" id="imgZ"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="dropImgs(event)">
      <span style="font-size:11px;color:var(--muted)">🖼️ 拖图片到此处，再拖到表格A列</span>
    </div>
    <div id="tblSec" class="hidden">
      <div class="tabs" id="tabs"></div>
      <div class="tbl-wrap" id="tbl"></div>
    </div>
  </div>
</div>

<!-- 02 -->
<div class="card">
  <div class="card-hd">02 AI 填写 & 输出</div>
  <div class="card-bd">
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-p" onclick="aiFill()" id="btnAi">🔍 AI 识别填写</button>
      <button class="btn btn-o" onclick="checkAI()">✅ 检查完整性</button>
      <button class="btn btn-s" onclick="showSave()" id="btnSave" disabled>💾 保存到输出区</button>
    </div>
    <div id="chkRes" style="font-size:12px;margin-bottom:16px"></div>
    <div style="font-weight:600;font-size:14px;margin-bottom:8px">📦 已完成的表格</div>
    <div class="output-list" id="outList"><div style="font-size:12px;color:var(--muted)">暂无</div></div>
  </div>
</div>

<!-- 03 -->
<div class="card">
  <div class="card-hd">03 自动上架</div>
  <div class="card-bd">
    <div style="font-weight:600;font-size:14px;margin-bottom:8px">选择数据源</div>
    <div class="toolbar" style="margin-bottom:12px">
      <button class="btn btn-o btn-sm" onclick="document.getElementById('f3').click()">📁 上传表格</button>
      <input type="file" id="f3" accept=".xlsx" hidden onchange="pubUpload(this.files[0])">
      <span style="font-size:12px;color:var(--muted)">或从输出区选择:</span>
    </div>
    <div class="pub-list" id="pubSel"><div style="font-size:12px;color:var(--muted)">暂无</div></div>
    <div id="pubMsg" style="font-size:12px;color:var(--muted);margin:10px 0"></div>
    <div class="btn-group" style="margin-bottom:12px">
      <button class="btn btn-p" onclick="startPub()" id="btnPub" disabled>🚀 开始自动上架</button>
      <button class="btn btn-o" onclick="stopPub()" id="btnStop" disabled>⏸ 暂停</button>
    </div>
    <div id="progSec" class="hidden">
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      <div class="progress-info"><span id="progTxt">0/0</span><span id="progCur"></span></div>
    </div>
    <div class="log" id="log"><span class="info">就绪</span></div>
  </div>
</div>

</div>

<!-- 保存弹窗 -->
<div class="modal-bg hidden" id="svModal">
  <div class="modal"><h3>💾 保存表格</h3><p>输入表格名称</p>
    <input id="svName" placeholder="例如: 2026夏连衣裙-5款" autofocus>
    <div class="btn-group" style="justify-content:center;margin-top:14px">
      <button class="btn btn-s" onclick="doSave()">确认</button>
      <button class="btn btn-o" onclick="document.getElementById('svModal').classList.add('hidden')">取消</button>
    </div>
  </div>
</div>

<script>
let TD=null, CS=null, CFG=null;          // tableData, currentSheet, config
let PD=null, PQ=[], PI=0, PR=false;      // publish
let imgs=[];                               // [{name,blob,url}]

(async()=>{try{CFG=await(await fetch('/api/config')).json()}catch(e){}loadOut();loadPub()})();

// ===== 图片 =====
function addImgs(files){for(let f of files){if(!f.type.startsWith('image/'))continue;imgs.push({name:f.name,blob:f,url:URL.createObjectURL(f)})}renderImgs()}
function dropImgs(e){e.preventDefault();document.getElementById('imgZ').classList.remove('dragover');if(e.dataTransfer.files.length)addImgs(e.dataTransfer.files)}
function renderImgs(){
  let z=document.getElementById('imgZ');
  z.innerHTML=imgs.map((m,i)=>`<img src="${m.url}" class="img-thumb" draggable="true" ondragstart="dragImg(${i})" title="${m.name}" oncontextmenu="event.preventDefault();imgs.splice(${i},1);renderImgs()">`).join('');
  if(!imgs.length)z.innerHTML='<span style="font-size:11px;color:var(--muted)">🖼️ 拖图片到此处，再拖到表格A列</span>';
}
let dragI=-1;function dragImg(i){dragI=i}

// ===== 上传 =====
async function upExcel(file){
  if(!file)return;
  let fd=new FormData();fd.append('file',file);
  document.getElementById('upMsg').innerHTML='<span class="tag tag-warn">解析中...</span>';
  setSt('busy','上传中');
  try{
    let resp=await fetch('/api/upload-excel',{method:'POST',body:fd});
    if(!resp.ok){document.getElementById('upMsg').innerHTML='<span class="tag tag-err">失败 HTTP '+resp.status+'</span>';setSt('ready','错误');return}
    let r=await resp.json();
    setSt('ready','就绪');
    let n=0;for(let s of r.sheetNames)n+=r.sheets[s]?.rows?.length||0;
    TD=r;document.getElementById('upMsg').innerHTML=`<span class="tag tag-ok">✓</span> ${r.sheetNames.length}类目 ${n}件`;
    document.getElementById('btnReset').style.display='';
    if(r.sheetNames.length){CS=r.sheetNames[0];renderAll()}
    addL('表格已加载: '+n+'件','ok');
  }catch(e){document.getElementById('upMsg').innerHTML='<span class="tag tag-err">网络错误</span>';setSt('ready','错误');alert('上传失败: '+e.message)}
}

function resetAll(){if(!confirm('清除当前表格?'))return;TD=null;CS=null;document.getElementById('tblSec').classList.add('hidden');document.getElementById('btnReset').style.display='none';document.getElementById('upMsg').textContent='未上传';document.getElementById('tbl').innerHTML='';document.getElementById('tabs').innerHTML='';document.getElementById('chkRes').innerHTML='';document.getElementById('btnSave').disabled=true}

function renderAll(){
  document.getElementById('tblSec').classList.remove('hidden');
  document.getElementById('tabs').innerHTML=TD.sheetNames.map(s=>`<div class="tab ${s===CS?'active':''}" onclick="switchS('${s}')">${s}</div>`).join('');
  renderTbl();
}
function switchS(s){CS=s;renderAll()}

function renderTbl(){
  if(!TD||!CS)return;
  let sh=TD.sheets[CS];
  let h='<table><thead><tr>';sh.headers.forEach(hd=>h+=`<th>${hd}</th>`);h+='</tr></thead><tbody>';
  sh.rows.forEach((row,ri)=>{
    h+='<tr>';
    sh.headers.forEach((hd,ci)=>{
      let v=row[hd]||'',cls=cCls(hd);
      if(!v&&cls==='c-ai')cls+=' c-empty';
      let c=v,isImg=ci===0||hd.includes('参考图');
      if(isImg&&row._images&&row._images.length){
        c='';row._images.forEach(im=>{c+=`<img src="${im}" style="width:56px;height:56px;object-fit:cover;border-radius:6px;margin:2px" onerror="this.style.display='none'">`});
        if(!c)c='[图片加载中]';
      }
      let ed=isImg?'':'contenteditable="true" spellcheck="false"';
      h+=`<td class="${cls}${isImg?' img-cell':''}" ${ed} data-s="${CS}" data-r="${ri}" data-h="${hd.replace(/"/g,'&quot;')}"
        ${isImg?`ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="cellDrop(event,'${CS}',${ri})"`:''}>${c}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('tbl').innerHTML=h;
}

async function cellDrop(e,sn,ri){
  e.preventDefault();e.target.classList.remove('dragover');
  syncEdit();
  if(!TD.sheets[sn].rows[ri]._images)TD.sheets[sn].rows[ri]._images=[];

  async function addImg(blob,name){
    let fd=new FormData();fd.append('file',blob,name);
    let resp=await fetch('/api/upload-image',{method:'POST',body:fd});
    let data=await resp.json();
    addL(`图片上传: ${data.url||'失败'}`, data.url?'ok':'err');
    if(data.url){
      if(!TD.sheets[sn].rows[ri]._images)TD.sheets[sn].rows[ri]._images=[];
      TD.sheets[sn].rows[ri]._images.push(data.url);
      TD.sheets[sn].rows[ri]._row = TD.sheets[sn].rows[ri]._row || (ri+5);
      delete TD.sheets[sn].rows[ri]._placeholder;
      renderTbl();
    }
  }

  if(dragI>=0&&dragI<imgs.length){
    let m=imgs[dragI];dragI=-1;
    await addImg(m.blob,m.name);
  }else if(e.dataTransfer.files.length){
    for(let f of e.dataTransfer.files){
      if(!f.type.startsWith('image/'))continue;
      await addImg(f,f.name);
    }
  }
}

function cCls(h){h=h.replace(/\n.*/,'').trim();
  let m=['参考图','款号','SKU','售价','发货模式','发货时间','备注'];
  let a=['商品标题','短标题','领型','袖长','裙长','裙型','裤长','裤型','版型','风格','颜色','材质','图案','腰型','衣长','厚薄','衣门襟','适用季节','适用场景','组合件数','款式','适用年龄','上装领型','上装袖长','下装类型','下装长度','面料'];
  let f=['尺码大小','适用人群','品牌','发货地','运费险','七天无理由'];
  for(let k of m)if(h.includes(k))return'c-man';
  for(let k of a)if(h.includes(k))return'c-ai';
  for(let k of f)if(h.includes(k))return'c-fix';
  return'c-man';
}

function aiHdrs(){if(!TD||!CS)return[];return TD.sheets[CS].headers.filter(h=>cCls(h)==='c-ai'&&!h.includes('商品标题')&&!h.includes('短标题'))}

// ===== AI =====
async function aiFill(){
  if(!TD){alert('请先上传表格');return}
  // 遍历所有Sheet
  let total=0,ok=0;
  let btn=document.getElementById('btnAi');btn.disabled=true;btn.textContent='⏳ 识别中...';setSt('busy','AI识别');

  for(let sn of TD.sheetNames){
    CS=sn;renderAll();
    let sh=TD.sheets[CS],ah=aiHdrs();
    if(!ah.length)continue;
    // 有嵌入图或A列有图片文件名的行
    function hasRefImg(row){if(row._images&&row._images.length)return true;for(let k of Object.keys(row)){if(k.includes('参考图')&&row[k]&&row[k].includes('.'))return true}return false}
    let needFill=sh.rows.filter(r=>hasRefImg(r)&&ah.some(h=>!r[h]));
    if(!needFill.length)continue;
    addL(`${sn}: ${needFill.length}行待识别`,'info');
    for(let row of needFill){
      total++;
      try{
        let skuVals=[];for(let k of Object.keys(row)){if(k.includes('SKU')&&row[k])skuVals.push(row[k])}
        // 获取图片路径：优先嵌入图，否则从A列文件名找
        let imgPath=row._images&&row._images.length?row._images[0]:'';
        if(!imgPath){for(let k of Object.keys(row)){if(k.includes('参考图')&&row[k]&&row[k].includes('.')){imgPath=row[k];break}}}
        let r=await(await fetch('/api/ai-recognize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_path:imgPath,category:CS,fields:ah,sku_hint:skuVals.join(' ')})})).json();
        if(r.ok&&r.attributes){
          for(let[k,v]of Object.entries(r.attributes))if(row.hasOwnProperty(k))row[k]=v;
          if(r.title){for(let k of Object.keys(row)){if(k.includes('商品标题'))row[k]=r.title;if(k.includes('短标题'))row[k]=r.short_title||''}}
          ok++;
        }
      }catch(e){addL(`识别错误: ${e.message}`,'err')}
    }
  }
  CS=TD.sheetNames[0];renderAll();
  btn.disabled=false;btn.textContent='🔍 AI 识别填写';setSt('ready','就绪');
  addL(`完成: ${ok}/${total}`,ok===total?'ok':'warn');
  document.getElementById('btnSave').disabled=false;
}

function checkAI(silent){
  if(!TD||!CS)return;
  let sh=TD.sheets[CS],ah=aiHdrs(),issues=[],t=0,f=0;
  sh.rows.forEach((row,i)=>ah.forEach(h=>{t++;if(row[h]&&row[h].trim())f++;else issues.push(`第${i+1}行 ${h}`)}));
  let pct=t?Math.round(f/t*100):0,d=document.getElementById('chkRes');
  if(issues.length){d.innerHTML=`<span class="tag tag-err">${issues.length}项未填</span> 完整度 ${pct}%`;
    if(!silent)d.innerHTML+=`<div style="margin-top:4px;font-size:11px;max-height:80px;overflow:auto">${issues.slice(0,12).map(s=>'<div style="color:#e74c3c">⚠ '+s+'</div>').join('')}${issues.length>12?'<div>...等'+issues.length+'项</div>':''}</div>`}
  else{d.innerHTML='<span class="tag tag-ok">✓ AI区域填写完整</span>';document.getElementById('btnSave').disabled=false}
  return issues.length===0;
}

// ===== 保存 =====
function showSave(){
  if(!TD){alert('请先上传表格');return}
  syncEdit();
  let incomplete=!checkAI(true);
  if(incomplete){
    if(!confirm('AI字段还有未填项，确定要保存吗？\n（可保存后手动编辑补充）'))return;
  }
  document.getElementById('svModal').classList.remove('hidden');
  document.getElementById('svName').focus();
}
function syncEdit(){if(!TD||!CS)return;let sh=TD.sheets[CS];document.querySelectorAll('#tbl td[contenteditable]').forEach(td=>{let r=parseInt(td.dataset.r),h=td.dataset.h;if(r<sh.rows.length)sh.rows[r][h]=td.textContent.trim()})}
async function doSave(){
  let nm=document.getElementById('svName').value.trim();
  if(!nm){alert('请输入名称');return}
  document.getElementById('svModal').classList.add('hidden');syncEdit();
  let r=await(await fetch('/api/save-output',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,sheets:TD.sheets})})).json();
  if(r.ok){addL('已保存: '+r.name,'ok');loadOut();loadPub()}else alert(r.error);
}
async function loadOut(){
  try{let r=await(await fetch('/api/output-tables')).json();
    let d=document.getElementById('outList');
    if(!r.tables.length){d.innerHTML='<div style="font-size:12px;color:var(--muted)">暂无</div>';return}
    d.innerHTML=r.tables.map(t=>`<div class="o-item"><div class="o-info">📊<div><div class="o-name">${t.name}</div><div class="o-meta">${t.size}</div></div></div><div style="display:flex;gap:6px"><button class="btn btn-o btn-sm" onclick="dlOut('${t.name}')">下载</button><button class="btn btn-o btn-sm" onclick="delOut('${t.name}')">删除</button></div></div>`).join('');
  }catch(e){}
}
function dlOut(n){window.open('/api/download-output/'+encodeURIComponent(n),'_blank')}
async function delOut(n){if(!confirm('删除 '+n+'?'))return;await fetch('/api/delete-output',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});loadOut();loadPub()}

// ===== 上架 =====
async function loadPub(){
  try{let r=await(await fetch('/api/output-tables')).json();let d=document.getElementById('pubSel');
    if(!r.tables.length){d.innerHTML='<div style="font-size:12px;color:var(--muted)">暂无</div>';return}
    d.innerHTML=r.tables.map(t=>`<div class="o-item" onclick="selPub('${t.name}',this)"><div class="o-info"><input type="radio" name="pb" style="width:16px;height:16px"><div class="o-name">${t.name}</div></div><div class="o-meta">${t.size}</div></div>`).join('');
  }catch(e){}
}
function selPub(n,el){document.querySelectorAll('#pubSel .o-item').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');PD=n;document.getElementById('pubMsg').innerHTML=`<span class="tag tag-ok">✓</span> ${n}`;document.getElementById('btnPub').disabled=false}
async function pubUpload(file){
  if(!file)return;let fd=new FormData();fd.append('file',file);
  let r=await(await fetch('/api/upload-excel',{method:'POST',body:fd})).json();
  PD='_up_';window._pd=r;
  document.getElementById('pubMsg').innerHTML=`<span class="tag tag-ok">✓</span> ${file.name}`;
  document.getElementById('btnPub').disabled=false;
}

function useCurrent(){if(!TD){alert("请先上传表格");return}syncEdit();window._curData=JSON.parse(JSON.stringify(TD));PD="_cur_";document.getElementById("pubMsg").innerHTML="<span class=\"tag tag-ok\">✓</span> 使用当前表格";document.getElementById("btnPub").disabled=false}
async function startPub(){
  if(!PD){alert("请先选择表格");return}
  let r;
  if(PD==="_cur_"){r=window._curData;if(!r||!r.sheetNames){alert("表格数据丢失，请重新上传");return}}
  else if(PD==="_up_"){r=window._pd;if(!r){alert("数据丢失");return}}
  else{let resp=await fetch('/api/download-output/'+encodeURIComponent(PD));if(!resp.ok){alert('加载失败');return}
    let fd=new FormData();fd.append('file',await resp.blob(),PD);
    r=await(await fetch('/api/upload-excel',{method:'POST',body:fd})).json()}
  PR=true;PI=0;PQ=[];
  for(let sn of r.sheetNames){let sh=r.sheets[sn];sh.rows.forEach((row,i)=>{if(!row._placeholder){let hasImg=row._images&&row._images.length;if(!hasImg){for(let k of Object.keys(row)){if(k.includes('参考图')&&row[k]&&row[k].includes('.')){hasImg=true;break}}}if(hasImg)PQ.push({sheet:sn,row:i})}})}
  if(!PQ.length){alert('没有可上架的商品（需要A列有图片的行）');document.getElementById('btnPub').disabled=false;return}
  document.getElementById('btnPub').disabled=true;document.getElementById('btnStop').disabled=false;
  document.getElementById('progSec').classList.remove('hidden');addL(`开始上架 ${PQ.length}件`,'info');procNext();
}
function stopPub(){PR=false;document.getElementById('btnPub').disabled=false;document.getElementById('btnStop').disabled=true;updProg();addL('已暂停','warn')}
async function procNext(){
  if(!PR||PI>=PQ.length){PR=false;document.getElementById('btnPub').disabled=false;document.getElementById('btnStop').disabled=true;updProg();addL(PI>=PQ.length?'✅ 全部完成':'已暂停','ok');return}
  let it=PQ[PI];updProg();addL(`${it.sheet} #${it.row+1}`,'info');
  try{let r=await(await fetch('/api/start-auto-upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sheet:it.sheet,rowIndex:it.row})})).json();
    if(r.ok)addL(`✓ ${it.sheet}#${it.row+1}`,'ok');
    else{addL(`✗ ${r.error||r.message}`,'err');if(!confirm(`出错: ${r.error||r.message}\n跳过继续?`)){stopPub();return}}
  }catch(e){addL(`✗ ${e.message}`,'err');if(!confirm(`错误: ${e.message}\n跳过?`)){stopPub();return}}
  PI++;if(PR)setTimeout(procNext,2000);
}
function updProg(){let t=PQ.length,d=PI,pct=t?Math.round(d/t*100):0;document.getElementById('progFill').style.width=pct+'%';document.getElementById('progTxt').textContent=`${d}/${t}`;if(PI<PQ.length&&PR)document.getElementById('progCur').textContent=`当前: ${PQ[PI].sheet}`}

function addL(m,t){let b=document.getElementById('log'),c=t==='ok'?'ok':t==='err'?'err':t==='warn'?'warn':'info';b.innerHTML+=`<div class="${c}">[${new Date().toLocaleTimeString()}] ${m}</div>`;b.scrollTop=b.scrollHeight}
function setSt(s,t){document.getElementById('dot').className='dot'+(s==='busy'?' busy':'');document.getElementById('stText').textContent=t}
</script>
